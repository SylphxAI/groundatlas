name: CI

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run checks
        run: bun run check

  external-dogfood:
    name: external dogfood
    runs-on: ubuntu-latest
    steps:
      - name: Check out GroundAtlas
        uses: actions/checkout@v5

      - name: Check out public dogfood target
        # Public CI must not depend on private internal repository credentials.
        # Internal fleet pilots can run the same dogfood script against Doctrine
        # or other private repos from credentialed environments.
        uses: actions/checkout@v5
        with:
          repository: SylphxAI/groundatlas
          ref: main
          path: .dogfood-targets/groundatlas

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22.14.0"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run packed-tarball external dogfood
        env:
          GROUNDATLAS_DOGFOOD_REPOS: ${{ github.workspace }}/.dogfood-targets/groundatlas
          GROUNDATLAS_DOGFOOD_REPORT_PATH: ${{ runner.temp }}/groundatlas-external-dogfood.json
        run: bun run dogfood:external

      - name: Assert external dogfood evidence
        run: >
          node scripts/assert-dogfood-report.mjs
          "${{ runner.temp }}/groundatlas-external-dogfood.json"
          --expect-pre-npm
          --expect-adopted
          --expect-neutral-manifest
          --expect-doctrine-adapter

      - name: Upload external dogfood evidence
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: groundatlas-external-dogfood
          path: ${{ runner.temp }}/groundatlas-external-dogfood.json
          if-no-files-found: warn
