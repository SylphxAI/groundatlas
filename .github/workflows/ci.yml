name: CI

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  rust:
    name: rust scanner
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      # Differential tests spawn scripts/differential/*-oracle.ts via bun.
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Install JS deps (TS oracles)
        run: bun install --frozen-lockfile

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Run Rust clippy
        run: cargo clippy --workspace -- -D warnings

  check:
    name: check
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust scanner for npm bridge tests
        run: cargo build -p groundatlas-scanner

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run checks
        env:
          # Packed action smoke runs outside workspace PATH; pin built scanner.
          GROUNDATLAS_RUST_SCANNER_BIN: ${{ github.workspace }}/target/debug/groundatlas-scanner
        run: bun run check

  external-dogfood:
    name: external dogfood
    runs-on: ubuntu-latest
    steps:
      - name: Check out GroundAtlas
        uses: actions/checkout@v5

      - name: Check out public dogfood target
        # Public CI must not depend on private internal repository credentials.
        # Internal fleet pilots can run the same dogfood script against Doctrine
        # or other private repos from credentialed environments.
        uses: actions/checkout@v5
        with:
          repository: SylphxAI/groundatlas
          ref: main
          path: .dogfood-targets/groundatlas

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22.14.0"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      # Pre-npm dogfood packs a JS tarball only. S1 defaults CLI scan to Rust
      # authority, so CI must supply a built scanner binary via env override.
      - name: Build groundatlas-scanner for dogfood
        run: cargo build -p groundatlas-scanner --release

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run packed-tarball external dogfood
        env:
          GROUNDATLAS_DOGFOOD_REPOS: ${{ github.workspace }}/.dogfood-targets/groundatlas
          GROUNDATLAS_DOGFOOD_REPORT_PATH: ${{ runner.temp }}/groundatlas-external-dogfood.json
          GROUNDATLAS_RUST_SCANNER_BIN: ${{ github.workspace }}/target/release/groundatlas-scanner
        run: bun run dogfood:external

      - name: Assert external dogfood evidence
        run: >
          node scripts/assert-dogfood-report.mjs
          "${{ runner.temp }}/groundatlas-external-dogfood.json"
          --expect-pre-npm
          --expect-adopted
          --expect-neutral-manifest
          --expect-doctrine-adapter

      - name: Upload external dogfood evidence
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: groundatlas-external-dogfood
          path: ${{ runner.temp }}/groundatlas-external-dogfood.json
          if-no-files-found: warn
