name: Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs/website/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload static site
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Smoke deployed site
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          python3 - <<'PY'
          import os
          import sys
          import time
          import urllib.request

          url = os.environ["PAGE_URL"]
          required = [
              "GroundAtlas",
              "Vendor-neutral by design",
              "After npm registry publish/readback",
              "https://github.com/SylphxAI/groundatlas/blob/main/schemas/project.manifest.schema.json",
          ]

          last_error = None
          for _ in range(12):
              try:
                  with urllib.request.urlopen(url, timeout=20) as response:
                      body = response.read().decode("utf-8", errors="replace")
                      missing = [needle for needle in required if needle not in body]
                      if response.status == 200 and not missing:
                          print(f"Pages smoke passed: {url}")
                          sys.exit(0)
                      last_error = f"status={response.status} missing={missing}"
              except Exception as error:  # noqa: BLE001 - CI smoke should report any transient failure.
                  last_error = repr(error)
              time.sleep(5)

          raise SystemExit(f"Pages smoke failed for {url}: {last_error}")
          PY
