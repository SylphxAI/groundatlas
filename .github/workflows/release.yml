name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to validate, for dry-run only unless this workflow is running from a tag"
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Set up Node.js for npm registry
        uses: actions/setup-node@v5
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm supports trusted publishing
        run: |
          npm install --global npm@^11.5.1
          npm --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release tag and registry availability
        run: bun run release:preflight
        env:
          GROUNDATLAS_RELEASE_TAG: ${{ inputs.release_tag }}

      - name: Publish to npm with provenance
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Registry readback
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          node scripts/npm-registry-readback.mjs | tee "$RUNNER_TEMP/groundatlas-npm-readback.json"
          node scripts/assert-json-file.mjs "$RUNNER_TEMP/groundatlas-npm-readback.json"

      - name: Check out post-publish dogfood target
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/checkout@v5
        with:
          repository: SylphxAI/groundatlas
          ref: ${{ github.sha }}
          path: .dogfood-targets/groundatlas-release

      - name: Run post-publish package dogfood
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GROUNDATLAS_DOGFOOD_REPOS: ${{ github.workspace }}/.dogfood-targets/groundatlas-release
          GROUNDATLAS_DOGFOOD_REPORT_PATH: ${{ runner.temp }}/groundatlas-post-publish-dogfood.json
        run: |
          package_version="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          GROUNDATLAS_DOGFOOD_PACKAGE_SPEC="groundatlas@$package_version" \
            node scripts/dogfood-external-repo.mjs

      - name: Assert post-publish package dogfood
        if: startsWith(github.ref, 'refs/tags/v')
        run: >
          node scripts/assert-dogfood-report.mjs
          "$RUNNER_TEMP/groundatlas-post-publish-dogfood.json"
          --expect-post-publish
          --expect-adopted
          --expect-neutral-manifest
          --expect-doctrine-adapter

      - name: Assert release evidence artifacts are JSON
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          node scripts/assert-json-file.mjs "$RUNNER_TEMP/groundatlas-npm-readback.json"
          node scripts/assert-json-file.mjs "$RUNNER_TEMP/groundatlas-post-publish-dogfood.json"

      - name: Upload release evidence
        if: always() && startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v5
        with:
          name: groundatlas-release-evidence
          path: |
            ${{ runner.temp }}/groundatlas-npm-readback.json
            ${{ runner.temp }}/groundatlas-post-publish-dogfood.json
          if-no-files-found: warn
