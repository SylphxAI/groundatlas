name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to validate, for dry-run only unless this workflow is running from a tag"
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Set up Node.js for npm registry
        uses: actions/setup-node@v5
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm supports trusted publishing
        run: |
          npm install --global npm@^11.5.1
          npm --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release tag and registry availability
        run: bun run release:preflight
        env:
          GROUNDATLAS_RELEASE_TAG: ${{ inputs.release_tag }}

      - name: Publish to npm with provenance
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm publish --access public --provenance

      - name: Registry readback
        if: startsWith(github.ref, 'refs/tags/v')
        run: bun run release:readback
